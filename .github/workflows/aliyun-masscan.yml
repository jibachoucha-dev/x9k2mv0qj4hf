name: aliyun-masscan
on:
  workflow_dispatch:
    inputs:
      rate:
        description: 'Packets per second'
        default: '200000'

jobs:
  masscan:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Install masscan
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y masscan python3

      - name: Fetch Aliyun IP ranges (AS37963 + AS45102)
        run: |
          python3 - <<'PY'
          import urllib.request, json

          prefixes = []
          for asn in [37963, 45102]:
              url = f"https://stat.ripe.net/data/announced-prefixes/data.json?resource=AS{asn}"
              with urllib.request.urlopen(url, timeout=30) as r:
                  d = json.load(r)
              p = [x["prefix"] for x in d.get("data",{}).get("prefixes",[]) if ":" not in x["prefix"]]
              print(f"AS{asn}: {len(p)} IPv4 prefixes")
              prefixes.extend(p)

          prefixes = sorted(set(prefixes))
          with open("targets.txt", "w") as f:
              f.write("\n".join(prefixes))

          total = sum(2**(32-int(c.split("/")[1])) for c in prefixes)
          print(f"Total: {len(prefixes)} CIDRs, ~{total:,} IPs")
          PY

      - name: Run masscan (all es_mongo ports)
        run: |
          # 覆盖 es_mongo_count_linux 全部服务端口
          PORTS="9200,9300,27017,6379,7474,7687,8848,2181,15672,9092,61616,8161,2375,2376,5601,8088,50070,8089,5985,5986,1433,3389,2049,111,873,5900,1099,4848,7077,8009,4000,7001,7002,9876,20880,9999,8090,8983,9090,8080,8443,10911,10912,50030,50060"
          echo "[*] Rate: ${{ inputs.rate }} pps"
          echo "[*] Ports: $PORTS"
          echo "[*] Targets: $(wc -l < targets.txt) CIDRs"
          sudo masscan \
            -iL targets.txt \
            -p "$PORTS" \
            --rate "${{ inputs.rate }}" \
            --wait 5 \
            --exclude 255.255.255.255 \
            -oJ masscan_raw.json
          echo "=== Open ports: $(grep -c '"port"' masscan_raw.json 2>/dev/null || echo 0) ==="

      - name: Parse results
        run: |
          python3 - <<'PY'
          import json, re

          with open("masscan_raw.json") as f:
              raw = f.read().strip()

          if not raw or raw == "[]":
              print("[!] No results"); exit(0)
          if not raw.startswith("["):
              raw = "[" + raw.rstrip(",\n") + "]"

          try:
              data = json.loads(raw)
          except:
              matches = re.findall(r'"ip":\s*"([\d.]+)".*?"port":\s*(\d+)', raw, re.DOTALL)
              data = [{"ip": ip, "ports": [{"port": int(p)}]} for ip, p in matches]

          hosts = {}
          for entry in data:
              ip = entry.get("ip")
              if not ip: continue
              for p in entry.get("ports", []):
                  hosts.setdefault(ip, set()).add(str(p.get("port","")))

          results, lines = [], []
          for ip, ports in sorted(hosts.items()):
              ports = sorted(ports, key=int)
              results.append({"ip": ip, "open_ports": ports})
              for port in ports:
                  lines.append(f"{ip}:{port}")

          with open("masscan_results.json","w") as f:
              json.dump(results, f, indent=2)
          with open("open_ports.txt","w") as f:
              f.write("\n".join(lines))

          print(f"[done] {len(hosts)} hosts, {len(lines)} open ports")
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aliyun-masscan-${{ github.run_id }}
          path: |
            masscan_raw.json
            masscan_results.json
            open_ports.txt
            targets.txt
          retention-days: 5
