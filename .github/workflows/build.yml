          import os
          idx = int(os.environ['IDX'])
          total = 20
          with open('aliyun_cidrs.txt') as f:
              cidrs = [l.strip() for l in f if l.strip()]
          # Round-robin distribute
          my_cidrs = cidrs[idx::total]
          with open('targets.txt', 'w') as f:
              for c in my_cidrs:
                  f.write(c + '\n')
          print(f'Shard {idx}: {len(my_cidrs)} CIDRs')
          PYEOF

          # Apollo ports + Nacos + actuator
          sudo masscan -iL targets.txt \
            -p 8070,8090,8848,9200 \
            --rate 30000 \
            --wait 5 \
            -oL raw.txt 2>/dev/null || true

          grep '^open' raw.txt 2>/dev/null | awk '{print $4":"$3}' | sort -u > r.txt
          echo "Found $(wc -l < r.txt) open ports"

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: d-${{ matrix.idx }}
          path: r.txt
          retention-days: 3

  merge:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - name: download
        uses: actions/download-artifact@v4
        with:
          pattern: d-*
          merge-multiple: false

      - name: combine
        run: |
          cat d-*/r.txt 2>/dev/null | sort -u > all.txt
          echo "=== Total ==="
          wc -l all.txt
          echo "=== By port ==="
          for p in 8070 8090 8848 9200; do
            cnt=$(grep ":${p}$" all.txt | wc -l)
            echo "Port $p: $cnt"
          done
          grep ':8070$' all.txt > apollo_portal.txt || true
          grep ':8090$' all.txt > apollo_admin.txt || true
          grep ':8848$' all.txt > nacos.txt || true
          grep ':9200$' all.txt > es.txt || true

      - name: upload-merged
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            all.txt
            apollo_portal.txt
            apollo_admin.txt
            nacos.txt
            es.txt
          retention-days: 7
