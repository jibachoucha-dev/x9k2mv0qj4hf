          101.132.0.0/14
          101.200.0.0/15
          101.254.0.0/16
          103.40.128.0/18
          106.11.0.0/16
          106.14.0.0/15
          110.75.0.0/16
          110.76.0.0/15
          112.124.0.0/14
          112.74.0.0/15
          114.55.0.0/16
          114.215.0.0/16
          115.28.0.0/15
          115.124.16.0/20
          116.62.0.0/15
          118.31.0.0/16
          118.178.0.0/15
          118.190.0.0/16
          119.23.0.0/16
          119.38.208.0/20
          120.24.0.0/14
          120.55.0.0/16
          120.76.0.0/14
          121.40.0.0/14
          121.89.0.0/16
          121.196.0.0/14
          121.248.0.0/14
          123.56.0.0/14
          123.206.0.0/15
          139.129.0.0/16
          139.196.0.0/14
          139.224.0.0/16
          140.205.0.0/16
          149.129.0.0/16
          161.117.0.0/16
          182.92.0.0/15
          203.107.0.0/16
          218.244.128.0/17
          1.12.0.0/14
          1.116.0.0/14
          43.128.0.0/12
          49.232.0.0/14
          49.4.0.0/14
          81.68.0.0/14
          81.70.0.0/15
          94.74.64.0/18
          101.33.0.0/16
          101.34.0.0/15
          101.36.0.0/15
          101.42.0.0/16
          101.43.0.0/16
          106.52.0.0/14
          106.75.0.0/16
          107.148.0.0/16
          109.244.0.0/16
          110.40.0.0/14
          110.42.0.0/15
          111.229.0.0/16
          111.230.0.0/15
          113.44.0.0/14
          114.116.0.0/14
          114.132.0.0/14
          116.198.0.0/15
          116.204.0.0/14
          117.50.0.0/16
          117.72.0.0/15
          118.89.0.0/16
          119.3.0.0/16
          119.8.0.0/15
          119.36.0.0/16
          119.45.0.0/16
          119.91.0.0/16
          120.46.0.0/15
