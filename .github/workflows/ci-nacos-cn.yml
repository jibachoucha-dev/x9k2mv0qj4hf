name: ci-nacos-cn
on:
  workflow_dispatch:
    inputs:
      rate:
        required: false
        default: "30000"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include:
          - batch: 0
            ranges: "1.0.0.0/8,14.0.0.0/8,27.0.0.0/8"
          - batch: 1
            ranges: "36.0.0.0/8,39.0.0.0/8,42.0.0.0/8"
          - batch: 2
            ranges: "43.0.0.0/8,45.0.0.0/8,47.0.0.0/8"
          - batch: 3
            ranges: "49.0.0.0/8,58.0.0.0/8,59.0.0.0/8"
          - batch: 4
            ranges: "60.0.0.0/8,61.0.0.0/8,101.0.0.0/8"
          - batch: 5
            ranges: "103.0.0.0/8,106.0.0.0/8,107.0.0.0/8"
          - batch: 6
            ranges: "110.0.0.0/8,111.0.0.0/8,112.0.0.0/8"
          - batch: 7
            ranges: "113.0.0.0/8,114.0.0.0/8,115.0.0.0/8"
          - batch: 8
            ranges: "116.0.0.0/8,117.0.0.0/8,118.0.0.0/8"
          - batch: 9
            ranges: "119.0.0.0/8,120.0.0.0/8,121.0.0.0/8"
          - batch: 10
            ranges: "122.0.0.0/8,123.0.0.0/8,124.0.0.0/8"
          - batch: 11
            ranges: "125.0.0.0/8,139.0.0.0/8,150.0.0.0/8"
          - batch: 12
            ranges: "163.0.0.0/8,171.0.0.0/8"
          - batch: 13
            ranges: "175.0.0.0/8,180.0.0.0/8"
          - batch: 14
            ranges: "182.0.0.0/8,183.0.0.0/8"
          - batch: 15
            ranges: "202.0.0.0/8,203.0.0.0/8"
          - batch: 16
            ranges: "210.0.0.0/8,211.0.0.0/8"
          - batch: 17
            ranges: "218.0.0.0/8,219.0.0.0/8"
          - batch: 18
            ranges: "220.0.0.0/8,221.0.0.0/8"
          - batch: 19
            ranges: "222.0.0.0/8,223.0.0.0/8"

    steps:
      - name: deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq masscan jq
          sudo setcap cap_net_raw+ep $(which masscan)

      - name: run
        run: |
          echo '${{ matrix.ranges }}' | tr ',' '\n' > ranges.txt
          masscan -iL ranges.txt -p8848 \
            --rate=${{ inputs.rate }} --open-only -oJ raw.json || true
          [ ! -f raw.json ] && echo "[]" > raw.json

          jq -r '.[] | "8848 \(.ip)"' raw.json 2>/dev/null \
            | grep -v ' null$' | sort -u > nacos_ports.txt || touch nacos_ports.txt

          echo "=== batch ${{ matrix.batch }} ==="
          echo "port_8848: $(wc -l < nacos_ports.txt)"

      - name: save
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nacos-${{ matrix.batch }}
          path: |
            nacos_ports.txt
            raw.json
          retention-days: 30
