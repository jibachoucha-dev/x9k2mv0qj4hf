name: full-recon-pipeline
on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Domain or IP/CIDR list (newline/comma separated)'
        required: true
      mode:
        description: 'subdomain (for domains) or portscan (for IPs)'
        default: 'subdomain'
      ports:
        description: 'For portscan mode'
        default: '80,443,8080,8443,7474,9200,6379,27017,5601,8888,9000,11211,2375,5984'
      rate:
        description: 'masscan rate'
        default: '2000'
      nuclei_tags:
        description: 'nuclei template tags'
        default: 'exposure,misconfig,cve,default-login,takeover'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install tools
        run: |
          sudo apt-get install -y -qq masscan
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Update nuclei templates
        run: nuclei -update-templates -silent

      - name: Prepare input
        run: |
          echo "${{ inputs.targets }}" | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' > input.txt
          echo "Input lines: $(wc -l < input.txt)"

      # ── Stage A (subdomain mode): subfinder → URLs ───────────────────
      - name: Subfinder (domain mode)
        if: inputs.mode == 'subdomain'
        run: |
          while read -r domain; do
            subfinder -d "$domain" -silent
          done < input.txt | sort -u > stage1_hosts.txt
          echo "Subdomains found: $(wc -l < stage1_hosts.txt)"

      # ── Stage A (portscan mode): masscan → ip:port ──────────────────
      - name: Masscan (IP mode)
        if: inputs.mode == 'portscan'
        run: |
          sudo masscan -iL input.txt \
            -p "${{ inputs.ports }}" \
            --rate "${{ inputs.rate }}" \
            --wait 3 -oL masscan.list
          grep '^open' masscan.list | awk '{print $4":"$3}' > stage1_hosts.txt
          echo "Open services: $(wc -l < stage1_hosts.txt)"

      # ── Stage B: httpx fingerprint ──────────────────────────────────
      - name: httpx
        run: |
          httpx -l stage1_hosts.txt \
            -title -tech-detect -status-code -server -ip -cdn -tls-grab \
            -json -o httpx.jsonl \
            -threads 50 -timeout 10 -silent
          jq -r '.url' httpx.jsonl > alive_urls.txt 2>/dev/null || touch alive_urls.txt
          echo "Alive HTTP: $(wc -l < alive_urls.txt)"

      # ── Stage C: nuclei ─────────────────────────────────────────────
      - name: nuclei
        if: hashFiles('alive_urls.txt') != ''
        run: |
          nuclei -l alive_urls.txt \
            -tags "${{ inputs.nuclei_tags }}" \
            -severity medium,high,critical \
            -rate-limit 50 -c 25 \
            -j -o nuclei.jsonl \
            -stats -silent || true
          echo "Findings: $(wc -l < nuclei.jsonl 2>/dev/null || echo 0)"

      # ── Bundle ──────────────────────────────────────────────────────
      - name: Bundle results
        if: always()
        run: |
          tar czf pipeline-${{ github.run_id }}.tar.gz \
            input.txt \
            $(ls stage1_hosts.txt masscan.list httpx.jsonl alive_urls.txt nuclei.jsonl 2>/dev/null) \
            2>/dev/null || true
          ls -la *.tar.gz

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-${{ github.run_id }}
          path: pipeline-${{ github.run_id }}.tar.gz
          retention-days: 3
